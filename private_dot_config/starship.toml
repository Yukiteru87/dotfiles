# 1Ť°Ć„Āā„ĀĎ„āč
add_newline = true

# format
format = """
$directory\
$git_branch\
$git_status\
$direnv\
$fill\
$cmd_duration\
$time\
\n$character\
"""

# left
[directory]
truncation_length = 6
truncation_symbol = 'ÔĀľ '
truncate_to_repo = false
home_symbol = '~'
read_only = ' ůįĆĺ ' 
format = """
[Óā∂](fg:#80EBDF)\
[$path]($style)\
[$read_only]($read_only_style)\
[Óāľ](fg:#80EBDF)\
"""
style = 'bold fg:#313244 bg:#80EBDF'
read_only_style = 'bold fg:#313244 bg:#80EBDF'

[git_branch]
symbol = "Ôźė"
style = "fg:#769ff0 bg:#1d2230"
format = """
[Óāļ](fg:#1d2230)\
[$symbol $branch]($style)\
"""

[git_status]
style = "fg:#769ff0 bg:#1d2230"
format = """
[$all_status$ahead_behind]($style)\
[Óāľ](fg:#1d2230)\
"""

[direnv]
disabled = false
format = """
[Óāļ](fg:#89dceb)\
[$symbol$allowed]($style)\
[Óāľ](fg:#89dceb)\
"""
style = "bold fg:#313244 bg:#89dceb"

[fill]
symbol = '-'

# right
[cmd_duration]
min_time = 1
style = 'fg:#e0af68'
format = "[ $duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
format = '[[ ÔÄó $time](fg:#a0a9cb)]($style)'

[character]
vimcmd_symbol = "[V](bold green) "
